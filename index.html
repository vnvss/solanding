<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soffy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;width:100%;background:#0a0010;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;overflow-x:hidden;}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:float 8s ease-in-out infinite;}
.orb1{width:520px;height:520px;background:radial-gradient(circle,#7c3aed99,#4c1d9544);top:-120px;left:-120px;}
.orb2{width:420px;height:420px;background:radial-gradient(circle,#a855f777,#6d28d944);bottom:-100px;right:-100px;animation-delay:-3s;}
.orb3{width:320px;height:320px;background:radial-gradient(circle,#ec489955,#be185d33);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-5s;}
@keyframes float{0%,100%{transform:translateY(0) scale(1);}33%{transform:translateY(-28px) scale(1.04);}66%{transform:translateY(18px) scale(0.97);}}
.hearts-bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
.heart-particle{position:absolute;opacity:0;animation:riseHeart linear infinite;}
@keyframes riseHeart{0%{opacity:0;transform:translateY(0) scale(0.5);}10%{opacity:0.35;}80%{opacity:0.12;}100%{opacity:0;transform:translateY(-100vh) scale(1.2);}}
.card{position:relative;z-index:10;max-width:400px;width:94%;text-align:center;padding:38px 28px 36px;background:rgba(255,255,255,0.04);border:1px solid rgba(196,132,252,0.18);border-radius:28px;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);box-shadow:0 0 70px rgba(124,58,237,0.18);animation:fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}

/* AVATAR - solo borde de colores, NADA encima de la foto */
.avatar-link{display:inline-block;text-decoration:none;margin-bottom:18px;}
.avatar-border{
  width:124px;height:124px;border-radius:50%;
  padding:3px;
  background:linear-gradient(135deg,#a855f7,#ec4899,#7c3aed,#f472b6);
}
@keyframes spinRing{from{filter:hue-rotate(0deg);}to{filter:hue-rotate(360deg);}}
.avatar-photo{
  width:100%;height:100%;border-radius:50%;
  background:#111;
  padding:3px;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.avatar-photo img{
  width:100%;height:100%;
  border-radius:50%;
  object-fit:cover;
  object-position:center top;
  display:block;
  /* NO filter, NO mix-blend-mode, NO opacity */
}

.name-badge{font-size:10.5px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:#c084fc;margin-bottom:10px;}
.headline{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;line-height:1.15;margin-bottom:13px;background:linear-gradient(90deg,#c084fc,#f472b6,#c084fc);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite;}
@keyframes shimmer{0%{background-position:0%;}100%{background-position:200%;}}
.subtext{font-size:14px;font-weight:300;color:rgba(255,255,255,0.55);line-height:1.65;margin-bottom:22px;}
.subtext strong{color:#c084fc;font-weight:500;-webkit-text-fill-color:#c084fc;}
.arrow-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:12px;gap:8px;}
.arrow-text{font-size:13px;color:rgba(255,255,255,0.4);font-style:italic;}
.arrow-svg{animation:bounce 1.4s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(5px);}}

/* BOTON - sin emoji, solo texto */
.cta-btn{
  display:flex;align-items:center;justify-content:center;
  width:100%;padding:18px 32px;
  background:linear-gradient(135deg,#7c3aed,#a855f7,#ec4899);
  background-size:200% 200%;
  border:none;border-radius:50px;color:#fff;
  font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;
  letter-spacing:1.5px;cursor:pointer;text-decoration:none;
  animation:gradShift 3s ease infinite;
  transition:transform 0.2s,box-shadow 0.2s;
  box-shadow:0 8px 36px rgba(124,58,237,0.5);
}
.cta-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 16px 44px rgba(168,85,247,0.6);}
.cta-btn:active{transform:scale(0.98);}
@keyframes gradShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
</style>
</head>
